name: Action Testing
on:
  push:
    paths:
      - "tests/**"
      - "action.yml"
      - ".github/workflows/*.yml"
  workflow_dispatch:

jobs:
  valid-coding-style:
    strategy:
      matrix:
        compile_source: ["", true]
    name: "Valid Coding Style ${{ matrix.compile_source != '' && '(Compiling from source)' || '' }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - id: cs2
        uses: ./
        with:
          path: tests/valid
          compile_source: ${{ matrix.compile_source }}
          ref: dev

  invalid-coding-style:
    strategy:
      matrix:
        compile_source: ["", true]
    name: "Invalid Coding Style ${{ matrix.compile_source != '' && '(Compiling from source)' || '' }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - id: cs2
        uses: ./
        continue-on-error: true
        with:
          path: tests/invalid
          compile_source: ${{ matrix.compile_source }}
          ref: dev
      - id: check-failure
        shell: bash
        run: |
          if ${{ ! steps.cs2.conclusion == 'failure' }}; then
            exit 1
          fi

